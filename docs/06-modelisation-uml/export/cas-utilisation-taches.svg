.2736" fill="#1F2937" font-size="14" lengthAdjust="spacing" textLength="105.0875" font-family="sans-serif">de suivi attribuées</text></g><!--entity UC_Notify--><g class="entity" data-qualified-name="HomeSkolar . T.ches.UC_Notify" id="ent0006" data-source-line="23"><ellipse cx="229.234" cy="383.0013" rx="75.514" ry="22.0513" fill="#F5EEFF" style="stroke:#7048A8;stroke-width:0.5;"/><text x="175.9465" y="380.5803" fill="#1F2937" font-size="14" lengthAdjust="spacing" textLength="106.575" font-family="sans-serif">Être informé d’une</text><text x="184.9152" y="394.5803" fill="#1F2937" font-size="14" lengthAdjust="spacing" textLength="88.6375" font-family="sans-serif">tâche attribuée</text></g><!--entity UC_Own--><g class="entity" data-qualified-name="HomeSkolar . T.ches.UC_Own" id="ent0007" data-source-line="24"><ellipse cx="229.2326" cy="542.0005" rx="101.1026" ry="22.6205" fill="#F5EEFF" style="stroke:#7048A8;stroke-width:0.5;"/><text x="146.7201" y="541.8877" fill="#1F2937" font-size="14" lengthAdjust="spacing" textLength="165.025" font-family="sans-serif">Créer une tâche personnelle</text><text x="183.7763" y="555.8877" fill="#1F2937" font-size="14" lengthAdjust="spacing" textLength="90.9125" font-family="sans-serif">(note ou mémo)</text></g><!--entity UC_ViewOwn--><g class="entity" data-qualified-name="HomeSkolar . T.ches.UC_ViewOwn" id="ent0008" data-source-line="25"><ellipse cx="229.2327" cy="303.9983" rx="95.9927" ry="21.7983" fill="#F5EEFF" style="stroke:#7048A8;stroke-width:0.5;"/><text x="159.9765" y="301.9534" fill="#1F2937" font-size="14" lengthAdjust="spacing" textLength="138.5125" font-family="sans-serif">Consulter ses éléments</text><text x="176.2952" y="315.9534" fill="#1F2937" font-size="14" lengthAdjust="spacing" textLength="105.875" font-family="sans-serif">personnels privés</text></g><!--entity Eleve--><g class="entity" data-qualified-name="Eleve" id="ent0001" data-source-line="17"><ellipse cx="33" cy="402" rx="16" ry="16" fill="#F1F1F1" style="stroke:#181818;stroke-width:0.5;"/><path d="M33,422 C37,422 40,422 44,418 C52,418 60,426 60,434 L60,438 C60,442 56,446 52,446 L14,446 C10,446 6,442 6,438 L6,434 C6,426 14,418 22,418 C26,422 29,422 33,422" style="stroke:#181818;stroke-width:0.5;" fill="#F1F1F1"/><text x="15.4562" y="457.3889" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="35.0875" font-family="sans-serif">Élève</text></g><!--entity Tuteur--><g class="entity" data-qualified-name="Tuteur" id="ent0002" data-source-line="18"><ellipse cx="446.61" cy="521" rx="16" ry="16" fill="#F1F1F1" style="stroke:#181818;stroke-width:0.5;"/><path d="M446.61,541 C450.61,541 453.61,541 457.61,537 C465.61,537 473.61,545 473.61,553 L473.61,557 C473.61,561 469.61,565 465.61,565 L427.61,565 C423.61,565 419.61,561 419.61,557 L419.61,553 C419.61,545 427.61,537 435.61,537 C439.61,541 442.61,541 446.61,541" style="stroke:#181818;stroke-width:0.5;" fill="#F1F1F1"/><text x="397.96" y="576.3889" fill="#000000" font-size="14" lengthAdjust="spacing" textLength="97.3" font-family="sans-serif">Tuteur bénévole</text></g><g class="entity" data-qualified-name="GMN16" id="ent0017" data-source-line="38"><path d="M134.6,197 L134.6,233 L323.8688,233 L323.8688,207 L313.8688,197 L134.6,197" style="stroke:#181818;stroke-width:0.5;" fill="#FEFFDD"/><path d="M313.8688,197 L313.8688,207 L323.8688,207 L313.8688,197" style="stroke:#181818;stroke-width:1;" fill="#FEFFDD"/><text x="140.6" y="212.1111" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="168.2688" font-family="sans-serif">Une tâche attribuée par le tuteur</text><text x="140.6" y="225.1111" fill="#000000" font-size="13" lengthAdjust="spacing" textLength="167.05" font-family="sans-serif">n’est pas modifiable par l’élève.</text></g><g class="entity" data-qualified-name="GMN19" id="ent0020" data-source-line="43"><path d="M120.5,112.5 L120.5,161.5 L337.9625,161.5 L337.9625,122.5 L327.9625,112.5 L120.5,112.5" style="stroke:#181818;stroke-width:0.5;" fill="#FEFFDD"/><pa